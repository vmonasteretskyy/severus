<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <!-- <link rel="icon" type="image/x-icon" href="favicon.png"> -->

    <link rel="stylesheet" href="css/lib/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/lib/bootstrap-grid.css" />
    <link rel="stylesheet" href="css/lib/select2.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header header--home">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-xl-2 col-lg-3">
                    <div class="header__logo">
                        <a href="#">
                            <img src="img/logo.svg" alt="logo">
                        </a>
                    </div>
                </div>
                <div class="col-xl-8 col-lg-6 mobile-menu-col">
                    <nav class="header__nav">
                        <uL>
                            <li><a href="#">What We Do</a></li>
                            <li><a href="#">Results</a></li>
                            <li><a href="#">About</a></li>
                            <li><a href="#">Insights</a></li>
                            <li><a href="#">Benefits</a></li>
                        </uL>
                    </nav>
                    <div class="header__contacts header__contacts--mobile">
                        <a href="#" class="mainbtn mainbtn_green">
                            Talk to Us
                            <span>
                                <img src="img/arrow-btn.svg" alt="icon">
                            </span>
                        </a>
                    </div>
                    <button class="close-menu">
                        <img src="img/close.png" alt="icon">
                    </button>
                </div>
                <div class="col-xl-2 col-lg-3">
                    <div class="header__contacts">
                        <a href="#" class="mainbtn">
                            Talk to Us
                            <span>
                                <img src="img/arrow-btn.svg" alt="icon">
                            </span>
                        </a>
                    </div>
                </div>
            </div>
            <button type="button" class="burger-btn" aria-label="Open menu" aria-expanded="false"
                aria-controls="header-nav">
                <img src="img/menu.png" alt="">
            </button>
        </div>
        <div class="menu-overlay" aria-hidden="true"></div>
    </header>

    <main class="main main-home">
        <section class="section--404">
            <div class="container">
                <div class="error-content">
                    <h1>
                        <span>Oops!</span> Our cat<br> unplugged this page.
                    </h1>
                    <p>
                        Don’t worry — the rest of the site is<br> still powered on. <span>Move to <a href="#">Homepage</a></span>
                    </p>
                </div>
            </div>
            <div class="error-imgwrap">
                <img class="error-img" src="img/cat.png" alt="cat" class="error-cat">
            </div>

        </section>
        <div class="error--bottomsect">
            <div class="container">
                <div class="error--bottomsect__row">
                    <p>
                        Copyright © 2023 Severus Inc. All Rights Reserved.
                    </p>
                    <ul>
                        <li><a href="#">Privacy Policy</a></li>
                        <li><a href="#">Terms & Conditions</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </main>



    <script src="js/lib/jquery.js"></script>
    <script src="js/lib/swiper-bundle.min.js"></script>
    <script src="js/lib/select2.full.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
